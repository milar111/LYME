<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYME — Live Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #06080f;
      --surface:   #0b0e1a;
      --border:    #1e2a4a;
      --accent:    #c8ff00;
      --danger:    #ff1744;
      --warn:      #ff9100;
      --ok:        #00e676;
      --muted:     #2a3a5a;
      --text:      #d0e8ff;
      --dim:       #4a6080;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow Condensed', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(200,255,0,.012) 3px,
        rgba(200,255,0,.012) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #06080f 60%, #0a1020 100%);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      border: 2px solid var(--accent);
      border-radius: 6px;
      display: grid; place-items: center;
      position: relative;
      box-shadow: 0 0 14px rgba(0,229,255,.35);
      animation: pulse-border 3s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 10px rgba(200,255,0,.4); }
      50%      { box-shadow: 0 0 26px rgba(200,255,0,.9); }
    }

    .logo-icon svg { width: 18px; height: 18px; fill: var(--accent); }

    .logo-text {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #fff;
    }

    .logo-text span { color: var(--accent); text-shadow: 0 0 18px rgba(200,255,0,.7); }

    .header-right { display: flex; align-items: center; gap: 20px; }

    .live-pill {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .08em;
      color: var(--ok);
      text-transform: uppercase;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--ok);
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: .2; }
    }

    #clock {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--dim);
      letter-spacing: .06em;
    }

    /* ── layout grid ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 0;
      height: calc(100vh - 63px);
    }

    /* ── video panel ── */
    .video-panel {
      grid-row: 1 / 3;
      position: relative;
      background: #000;
      display: flex;
      align-items: stretch;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #stream {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .6s;
    }

    #stream.loaded { opacity: 1; }

    .stream-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .82rem;
      letter-spacing: .08em;
      pointer-events: none;
    }

    .stream-placeholder svg { width: 48px; height: 48px; opacity: .4; }

    /* alert flash overlay */
    #alert-flash {
      position: absolute; inset: 0;
      border: 0px solid transparent;
      transition: border-width .05s, border-color .05s;
      pointer-events: none;
      z-index: 10;
    }

    #alert-flash.active {
      border: 6px solid var(--danger);
      box-shadow: inset 0 0 50px rgba(255,23,68,.35);
      animation: flash-pulse .4s step-end infinite;
    }

    @keyframes flash-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* corner brackets */
    .corner { position: absolute; width: 28px; height: 28px; pointer-events: none; z-index: 5; }
    .corner.tl { top: 14px; left: 14px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.tr { top: 14px; right: 14px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .corner.bl { bottom: 14px; left: 14px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.br { bottom: 14px; right: 14px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* video bottom bar */
    .video-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 18px;
      background: linear-gradient(0deg, rgba(6,8,15,.92) 0%, transparent 100%);
      display: flex; align-items: center; gap: 18px;
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .06em;
      color: var(--dim);
      z-index: 5;
    }

    #frame-count { color: var(--muted); }

    /* ── right sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .sidebar::-webkit-scrollbar { display: none; }

    /* ── stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--surface);
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background .2s;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: .63rem;
      letter-spacing: .1em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .stat-value {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 1.55rem;
      line-height: 1;
      color: #fff;
      transition: color .3s;
    }

    .stat-sub {
      font-family: var(--mono);
      font-size: .63rem;
      color: var(--muted);
    }

    /* ── zone status block ── */
    .zone-block {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }

    .zone-state {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .zone-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--ok);
      flex-shrink: 0;
      transition: background .3s;
      box-shadow: 0 0 8px var(--ok);
    }

    .zone-indicator.warn  { background: var(--warn);   box-shadow: 0 0 8px var(--warn); }
    .zone-indicator.alert { background: var(--danger);  box-shadow: 0 0 12px var(--danger); animation: blink .4s step-end infinite; }

    #zone-label {
      font-family: var(--mono);
      font-size: .85rem;
      letter-spacing: .06em;
      color: var(--text);
    }

    /* ── log panel ── */
    .log-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 10px;
      overflow: hidden;
    }

    #log-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-entry {
      font-family: var(--mono);
      font-size: .68rem;
      letter-spacing: .04em;
      color: var(--muted);
      padding: 6px 10px;
      border-left: 2px solid var(--border);
      border-radius: 2px;
      line-height: 1.5;
      animation: slide-in .2s ease;
      transition: border-color .3s;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .log-entry.alert { border-color: var(--danger); color: var(--danger); }
    .log-entry.warn  { border-color: var(--warn);   color: var(--warn); }
    .log-entry.ok    { border-color: var(--ok);     color: var(--ok); }

    .log-time {
      display: block;
      color: var(--dim);
      font-size: .6rem;
      margin-bottom: 2px;
    }

    /* ── shutdown button ── */
    .action-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--dim);
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }

    .btn:hover { border-color: var(--muted); color: var(--text); }

    .btn-danger {
      border-color: rgba(255,45,85,.4);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(255,23,68,.14);
      border-color: var(--danger);
      box-shadow: 0 0 18px rgba(255,23,68,.35);
    }

    /* ── person badge ── */
    #person-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .06em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--ok);
      color: var(--ok);
      background: rgba(48,209,88,.08);
      transition: all .3s;
    }

    #person-badge.detected {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,23,68,.12);
      box-shadow: 0 0 14px rgba(255,23,68,.35);
    }

    /* shutdown modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(6,8,15,.88);
      z-index: 200;
      place-items: center;
    }

    .modal-overlay.open { display: grid; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 50px rgba(255,23,68,.25);
    }

    .modal h2 {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 10px;
    }

    .modal p {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-actions { display: flex; gap: 12px; }

    .modal-actions .btn { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
      </svg>
    </div>
    <div class="logo-text">LY<span>ME</span></div>
  </div>

  <div class="header-right">
    <div class="live-pill">
      <div class="live-dot"></div>
      Live
    </div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<div class="layout">

  <!-- video -->
  <div class="video-panel">
    <div class="stream-placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
      Waiting for stream…
    </div>

    <img id="stream" src="/video_feed" alt="Camera feed"
         onload="this.classList.add('loaded'); document.getElementById('placeholder').style.display='none'"/>

    <div id="alert-flash"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="video-bar">
      <span id="person-badge">
        <span id="badge-dot" style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>
        <span id="badge-text">No person</span>
      </span>
      <span style="margin-left:auto;">FRAMES: <span id="frame-count">—</span></span>
    </div>
  </div>

  <!-- sidebar -->
  <div class="sidebar">

    <!-- stat cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="stat-status" style="font-size:1.1rem;margin-top:2px;">—</div>
        <div class="stat-sub">Zone state</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Seen</div>
        <div class="stat-value" id="stat-last">—</div>
        <div class="stat-sub">seconds ago</div>
      </div>
    </div>

    <!-- zone status -->
    <div class="zone-block">
      <div class="section-title">Zone Monitor</div>
      <div class="zone-state">
        <div class="zone-indicator" id="zone-dot"></div>
        <span id="zone-label">CLEAR</span>
      </div>
    </div>

    <!-- event log -->
    <div class="log-panel">
      <div class="section-title">Event Log</div>
      <div id="log-list"></div>
    </div>

    <!-- actions -->
    <div class="action-bar">
      <button class="btn" onclick="clearLog()">Clear Log</button>
      <button class="btn btn-danger" onclick="document.getElementById('modal').classList.add('open')">Shutdown</button>
    </div>

  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Confirm Shutdown</h2>
    <p>This will terminate the camera feed and stop all monitoring. Are you sure?</p>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" onclick="shutdown()">Shut Down</button>
    </div>
  </div>
</div>

<script>
  function tickClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().slice(0, 8);
  }
  tickClock();
  setInterval(tickClock, 1000);

  const MAX_LOG = 60;
  const logList = document.getElementById('log-list');

  function addLog(message, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-entry${type === 'alert' ? ' alert' : type === 'warn' ? ' warn' : type === 'ok' ? ' ok' : ''}`;
    const t = new Date().toTimeString().slice(0, 8);
    entry.innerHTML = `<span class="log-time">${t}</span>${message}`;
    logList.prepend(entry);
    while (logList.children.length > MAX_LOG) logList.removeChild(logList.lastChild);
  }

  function clearLog() {
    logList.innerHTML = '';
    addLog('Log cleared.', 'info');
  }

  let prevPerson = null;
  let prevAlert  = false;

  async function pollStatus() {
    try {
      const res  = await fetch('/status');
      const data = await res.json();

      const { person_in_sight, last_seen_ago, frame_count } = data;

      document.getElementById('frame-count').textContent =
        frame_count !== undefined ? frame_count.toLocaleString() : '—';

      document.getElementById('stat-last').textContent =
        last_seen_ago !== null ? last_seen_ago : '—';

      const badge = document.getElementById('person-badge');
      const badgeText = document.getElementById('badge-text');
      if (person_in_sight) {
        badge.classList.add('detected');
        badgeText.textContent = 'Person detected';
      } else {
        badge.classList.remove('detected');
        badgeText.textContent = 'No person';
      }

      const dot   = document.getElementById('zone-dot');
      const label = document.getElementById('zone-label');
      const stat  = document.getElementById('stat-status');
      const flash = document.getElementById('alert-flash');

      if (person_in_sight) {
        dot.className   = 'zone-indicator alert';
        label.textContent = 'INTRUDING';
        stat.textContent  = 'INTRUDING';
        stat.style.color  = 'var(--danger)';
        flash.classList.add('active');
      } else {
        dot.className   = 'zone-indicator';
        label.textContent = 'CLEAR';
        stat.textContent  = 'CLEAR';
        stat.style.color  = 'var(--ok)';
        flash.classList.remove('active');
      }

      if (prevPerson !== null) {
        if (person_in_sight && !prevPerson)
          addLog(' Person entered zone.', 'alert');
        else if (person_in_sight && prevPerson)
          addLog(' Zone cleared.', 'ok');
      } else {
        addLog('Monitoring started.', 'ok');
      }
      prevPerson = person_in_sight;

    } catch (e) {
      addLog('Connection lost — retrying…', 'warn');
    }
  }

  pollStatus();
  setInterval(pollStatus, 4000);

  async function shutdown() {
    document.getElementById('modal').classList.remove('open');
    addLog('Shutdown command sent.', 'warn');
    try {
      await fetch('/shutdown', { method: 'POST' });
      addLog('Server acknowledged shutdown.', 'ok');
    } catch {
      addLog('No response — server may already be offline.', 'warn');
    }
  }
</script>
</body>
</html>
