<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LYME — Pose Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e1117;
    --panel:    #131820;
    --border:   #1e2a38;
    --border2:  #181f2a;
    --text:     #e2e8f0;
    --muted:    #3d4f63;
    --subtle:   #2d3a4a;
    --lime:     #a3e635;
    --lime-t:   #bef264;
    --red:      #ef4444;
    --red-t:    #fca5a5;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }

  .shell {
    display: grid;
    grid-template-rows: 54px 1fr 42px;
    grid-template-columns: 1fr 264px;
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }

  header {
    grid-column: 1/-1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: #1a2a10; border: 1px solid #3a5a18;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-icon svg { width: 16px; height: 16px; }
  .brand-name { font-size: 17px; font-weight: 600; letter-spacing: 0.08em; color: var(--lime); }
  .brand-sub  { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-top: 1px; }
  #clock { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .video-wrap { background: #07090d; position: relative; overflow: hidden; border-right: 1px solid var(--border); }
  .video-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .corner { position: absolute; width: 18px; height: 18px; border-color: var(--lime); border-style: solid; opacity: .7; }
  .tl { top: 14px; left: 14px;    border-width: 2px 0 0 2px; }
  .tr { top: 14px; right: 14px;   border-width: 2px 2px 0 0; }
  .bl { bottom: 14px; left: 14px;  border-width: 0 0 2px 2px; }
  .br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

  #badge {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 6px 18px; border-radius: 20px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.07em;
    white-space: nowrap; transition: all .25s;
    font-family: 'JetBrains Mono', monospace;
  }
  #badge.ok  { background: rgba(163,230,53,.14); color: var(--lime-t); border: 1px solid rgba(163,230,53,.35); }
  #badge.off { background: rgba(239,68,68,.12);  color: var(--red-t);  border: 1px solid rgba(239,68,68,.28); }

  .side { background: var(--bg); display: flex; flex-direction: column; gap: 1px; }
  .widget { background: var(--panel); padding: 15px 18px; flex-shrink: 0; }
  .wlabel { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 13px; }

  .orb-row { display: flex; align-items: center; gap: 12px; }
  #orb {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: border-color .3s;
  }
  .orb-inner { width: 13px; height: 13px; border-radius: 50%; transition: background .3s; }
  #orb.ok  { border-color: rgba(163,230,53,.45); }
  #orb.ok  .orb-inner { background: var(--lime); }
  #orb.off { border-color: rgba(239,68,68,.35); }
  #orb.off .orb-inner { background: var(--red); }
  #orb-title { font-size: 13px; font-weight: 500; margin: 0; transition: color .3s; }
  #orb-title.ok  { color: var(--lime-t); }
  #orb-title.off { color: var(--red-t); }
  #orb-sub { font-size: 11px; color: var(--muted); margin: 3px 0 0; }

  .metric { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border2); }
  .metric:last-child { border-bottom: none; }
  .mk { color: var(--muted); }
  .mv { font-family: 'JetBrains Mono', monospace; color: #7a95b0; }

  .log-wrap { flex: 1; background: var(--panel); padding: 15px 18px; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  #log { flex: 1; overflow-y: auto; scrollbar-width: none; }
  #log::-webkit-scrollbar { display: none; }
  .le { display: flex; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 3px 0; border-bottom: 1px solid var(--border2); }
  .le:last-child { border: none; }
  .lt { color: var(--subtle); flex-shrink: 0; }
  .le.ok  .lm { color: var(--lime-t); }
  .le.off .lm { color: var(--red-t); }
  .le.inf .lm { color: var(--subtle); }

  footer {
    grid-column: 1/-1;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
    font-size: 11px; color: var(--subtle);
    font-family: 'JetBrains Mono', monospace;
  }
  .live { display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime); }
  
  #quit-btn {
    margin-top: 15px; width: 100%; background: #2d3a4a; border: 1px solid var(--border); 
    color: var(--red-t); padding: 8px; border-radius: 4px; font-size: 11px; 
    cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: background 0.3s;
  }
  #quit-btn:hover { background: #3d4f63; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="3" fill="#a3e635"/>
          <circle cx="8" cy="2" r="1.2" fill="#a3e635" opacity=".5"/>
          <circle cx="8" cy="14" r="1.2" fill="#a3e635" opacity=".5"/>
          <circle cx="2" cy="8" r="1.2" fill="#a3e635" opacity=".5"/>
          <circle cx="14" cy="8" r="1.2" fill="#a3e635" opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">LYME</div>
        <div class="brand-sub">pose detection monitor</div>
      </div>
    </div>
    <span id="clock">—</span>
  </header>

  <div class="video-wrap">
    <img id="feed" src="/video_feed" alt="Camera feed" />
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="badge" class="off">no one in sight</div>
  </div>

  <div class="side">

    <div class="widget">
      <div class="wlabel">Status</div>
      <div class="orb-row">
        <div id="orb" class="off"><div class="orb-inner"></div></div>
        <div>
          <p id="orb-title" class="off">Scanning…</p>
          <p id="orb-sub">—</p>
        </div>
      </div>
      <button id="quit-btn" onclick="quitApp()">SHUTDOWN SYSTEM</button>
    </div>

    <div class="widget">
      <div class="wlabel">Metrics</div>
      <div class="metric"><span class="mk">Frames</span><span class="mv" id="m-frames">—</span></div>
      <div class="metric"><span class="mk">Last seen</span><span class="mv" id="m-last">—</span></div>
      <div class="metric"><span class="mk">Camera</span><span class="mv">index 0</span></div>
      <div class="metric"><span class="mk">Poll</span><span class="mv">1 000 ms</span></div>
    </div>

    <div class="log-wrap">
      <div class="wlabel">Event log</div>
      <div id="log">
        <div class="le inf"><span class="lt">—</span><span class="lm">started</span></div>
      </div>
    </div>

  </div>

  <footer>
    <span class="live"><div class="live-dot"></div> live stream</span>
    <span id="fstatus">initialising</span>
    <span>mediapipe · opencv · flask</span>
  </footer>

</div>
<script>
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  setInterval(tick, 1000); tick();

  let last = null;

  function addLog(msg, cls) {
    const log = document.getElementById('log');
    const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const row = document.createElement('div');
    row.className = 'le ' + cls;
    row.innerHTML = `<span class="lt">${t}</span><span class="lm">${msg}</span>`;
    log.prepend(row);
    while (log.children.length > 50) log.lastChild.remove();
  }

  async function poll() {
    try {
      const d = await fetch('/status').then(r => r.json());
      const det = d.person_in_sight;
      const cls = det ? 'ok' : 'off';

      const badge = document.getElementById('badge');
      badge.className = cls;
      badge.textContent = det ? 'person detected' : 'no one in sight';

      document.getElementById('orb').className = cls;
      const title = document.getElementById('orb-title');
      title.className = cls;
      title.textContent = det ? 'Person detected' : 'No one in sight';

      document.getElementById('orb-sub').textContent =
        d.last_seen_ago != null ? 'last seen ' + d.last_seen_ago + 's ago' : 'never detected';
      document.getElementById('m-frames').textContent = d.frame_count.toLocaleString();
      document.getElementById('m-last').textContent =
        d.last_seen_ago != null ? d.last_seen_ago + 's ago' : '—';
      document.getElementById('fstatus').textContent =
        det ? 'presence confirmed' : 'area clear';

      if (det !== last) {
        if (last !== null)
          addLog(det ? 'human entered frame' : 'human left frame', cls);
        last = det;
      }
    } catch (_) {
      document.getElementById('fstatus').textContent = 'connection error';
    }
  }

  setInterval(poll, 1000);
  poll();

  async function quitApp() {
    if (!confirm("Are you sure you want to shut down the security system?")) return;
    try {
        await fetch('/shutdown', { method: 'POST' });
        document.body.innerHTML = `
            <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--red); font-family:'JetBrains Mono'; flex-direction:column; text-align:center;">
                <h1 style="letter-spacing:4px;">SYSTEM OFFLINE</h1>
                <p style="color:var(--muted); margin-top:10px;">The monitoring engine has stopped. You can now close this tab.</p>
            </div>
        `;
    } catch (e) {
        alert("Shutdown command failed.");
    }
  }
</script>
</body>
</html>
